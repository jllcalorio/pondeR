# ──────────────────────────────────────────────────────────────────────────────
# pkgdown.yaml
# Automatically builds and deploys the pondeR pkgdown site to GitHub Pages
# once per month ONLY if there were commits in the previous 30 days.
# Manual runs are still allowed from the Actions tab.
# ──────────────────────────────────────────────────────────────────────────────

on:
  # Run monthly: midnight UTC on the 1st day of each month
  schedule:
    - cron: '0 0 1 * *'

  # Allow manual runs from the Actions tab
  workflow_dispatch:

name: pkgdown

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Needed to deploy to GitHub Pages
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.recent_commits.outputs.skip }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Check for recent commits
        id: recent_commits
        run: |
          commits=$(git log --since="30 days ago" --oneline | wc -l)
          echo "Commits in last 30 days: $commits"
          if [ "$commits" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  pkgdown:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # 1. Check out the repository (Logic from redundant steps 2 & 3 removed)
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # 4. Set up Pandoc
      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2.7.1

      # 5. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2.11.3
        with:
          use-public-rspm: true

      # # Temporary step
      # - name: Show dependency plan
      #   shell: Rscript {0}
      #   run: |
      #     install.packages("pak")
      #     pak::pkg_deps(".", dependencies = TRUE)

      - name: Install system MPI
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin

      # 7. Install R dependencies
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2.3.0
        with:
          extra-packages: |
            any::pkgdown
            any::BiocManager
            bioc::BiocParallel
            bioc::imputeLCMD
            bioc::matrixStats
            bioc::pmp
            bioc::sva
            bioc::vsn
          needs: website

      # 10. Build pkgdown site
      - name: Build site
        run: pkgdown::build_site_github_pages(
          new_process = FALSE
          )
        shell: Rscript {0}

      # 11. Deploy to gh-pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: true
          branch: gh-pages
          folder: docs