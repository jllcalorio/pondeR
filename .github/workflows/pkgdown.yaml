# ──────────────────────────────────────────────────────────────────────────────
# pkgdown.yaml
# Automatically builds and deploys the pondeR pkgdown site to GitHub Pages
# whenever you push to the main branch (or manually trigger it).
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

name: pkgdown

# Needed to deploy to GitHub Pages
permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Pandoc (needed for vignette rendering)
      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      # 3. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # fast binary packages from Posit Public Package Manager

      # 4. Install system libraries required by some pondeR dependencies
      #    (BiocParallel / vsn / imputeLCMD pull in C/Fortran libs)
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libfontconfig1-dev \
            libgit2-dev \
            libgmp-dev \
            libmpfr-dev

      # 5. Install R package dependencies (reads DESCRIPTION automatically)
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::BiocManager
          needs: website

      # 6. Install Bioconductor packages that CRAN rspm doesn't serve
      - name: Install Bioconductor dependencies
        run: |
          Rscript -e "
            if (!requireNamespace('BiocManager', quietly = TRUE))
              install.packages('BiocManager')
            BiocManager::install(
              c('BiocParallel', 'imputeLCMD', 'matrixStats',
                'pmp', 'sva', 'vsn'),
              ask = FALSE, update = FALSE
            )
          "

      # 7. Build the pkgdown site
      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      # 8. Deploy to the gh-pages branch
      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: true
          branch: gh-pages
          folder: docs
